<svg width="600" height="260" xmlns="http://www.w3.org/2000/svg">
  <style>
    .text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; fill: white; font-size: 16px; font-weight: 500; }
    .bubble { fill: #444444; rx: 18; }
    .g-b { opacity: 0; animation: fadeIn 0.4s forwards; }
    .d1 { animation-delay: 0.1s; }
    .d2 { animation-delay: 0.3s; }
    .d3 { animation-delay: 0.5s; }
    .d4 { animation-delay: 0.7s; }
    .d5 { animation-delay: 0.9s; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>

  <g class="g-b d1">
    <rect class="bubble" x="0" y="0" width="290" height="38"/>
    <text class="text" x="18" y="24">Hi, I'm Bukke Sai Charan Naik 👋</text>
  </g>

  <g class="g-b d2">
    <rect class="bubble" x="0" y="50" width="330" height="38"/>
    <text class="text" x="18" y="74">Upskilling to become a Data Analyst 📊</text>
  </g>

  <g class="g-b d3">
    <rect class="bubble" x="0" y="100" width="360" height="38"/>
    <text class="text" x="18" y="124">Focusing on Python, SQL, and Power BI 🐍</text>
  </g>

  <g class="g-b d4">
    <rect class="bubble" x="0" y="150" width="250" height="38"/>
    <text class="text" x="18" y="174">Avid anime fan and gamer 🎮</text>
  </g>

  <g class="g-b d5">
    <rect class="bubble" x="0" y="200" width="260" height="38"/>
    <text class="text" x="18" y="224">Based in Hyderabad, India 📍</text>
  </g>
</svg>
