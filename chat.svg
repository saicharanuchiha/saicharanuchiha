<svg width="600" height="260" xmlns="http://www.w3.org/2000/svg">
  <style>
    .text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; fill: white; font-size: 16px; font-weight: 500; }
    .bubble { fill: #444444; rx: 18; }
    .dot { fill: #aaaaaa; animation: bounce 0.9s infinite; }
    .dot2 { animation-delay: 0.2s; }
    .dot3 { animation-delay: 0.4s; }

    .g-type { opacity: 0; animation: typeInOut 1s forwards; }
    .g-msg { opacity: 0; animation: msgIn 0.3s forwards; }

    /* Typing Delays */
    .t1 { animation-delay: 0.2s; }
    .t2 { animation-delay: 2.2s; }
    .t3 { animation-delay: 4.2s; }
    .t4 { animation-delay: 6.2s; }
    .t5 { animation-delay: 8.2s; }

    /* Message Delays (Exactly 1 second after typing starts) */
    .m1 { animation-delay: 1.2s; }
    .m2 { animation-delay: 3.2s; }
    .m3 { animation-delay: 5.2s; }
    .m4 { animation-delay: 7.2s; }
    .m5 { animation-delay: 9.2s; }

    @keyframes typeInOut {
      0% { opacity: 0; transform: translateY(10px); }
      15% { opacity: 1; transform: translateY(0); }
      99% { opacity: 1; transform: translateY(0); }
      100% { opacity: 0; transform: translateY(0); }
    }

    @keyframes msgIn {
      0% { opacity: 0; transform: translateY(5px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-3px); }
    }
  </style>

  <g class="g-type t1">
    <rect class="bubble" x="0" y="0" width="70" height="38"/>
    <circle cx="20" cy="19" r="3.5" class="dot"/>
    <circle cx="35" cy="19" r="3.5" class="dot dot2"/>
    <circle cx="50" cy="19" r="3.5" class="dot dot3"/>
  </g>
  <g class="g-msg m1">
    <rect class="bubble" x="0" y="0" width="290" height="38"/>
    <text class="text" x="18" y="24">Hi, I'm Bukke Sai Charan Naik 👋</text>
  </g>

  <g class="g-type t2">
    <rect class="bubble" x="0" y="50" width="70" height="38"/>
    <circle cx="20" cy="69" r="3.5" class="dot"/>
    <circle cx="35" cy="69" r="3.5" class="dot dot2"/>
    <circle cx="50" cy="69" r="3.5" class="dot dot3"/>
  </g>
  <g class="g-msg m2">
    <rect class="bubble" x="0" y="50" width="330" height="38"/>
    <text class="text" x="18" y="74">Upskilling to become a Data Analyst 📊</text>
  </g>

  <g class="g-type t3">
    <rect class="bubble" x="0" y="100" width="70" height="38"/>
    <circle cx="20" cy="119" r="3.5" class="dot"/>
    <circle cx="35" cy="119" r="3.5" class="dot dot2"/>
    <circle cx="50" cy="119" r="3.5" class="dot dot3"/>
  </g>
  <g class="g-msg m3">
    <rect class="bubble" x="0" y="100" width="360" height="38"/>
    <text class="text" x="18" y="124">Focusing on Python, SQL, and Power BI 🐍</text>
  </g>

  <g class="g-type t4">
    <rect class="bubble" x="0" y="150" width="70" height="38"/>
    <circle cx="20" cy="169" r="3.5" class="dot"/>
    <circle cx="35" cy="169" r="3.5" class="dot dot2"/>
    <circle cx="50" cy="169" r="3.5" class="dot dot3"/>
  </g>
  <g class="g-msg m4">
    <rect class="bubble" x="0" y="150" width="250" height="38"/>
    <text class="text" x="18" y="174">Avid anime fan and gamer 🎮</text>
  </g>

  <g class="g-type t5">
    <rect class="bubble" x="0" y="200" width="70" height="38"/>
    <circle cx="20" cy="219" r="3.5" class="dot"/>
    <circle cx="35" cy="219" r="3.5" class="dot dot2"/>
    <circle cx="50" cy="219" r="3.5" class="dot dot3"/>
  </g>
  <g class="g-msg m5">
    <rect class="bubble" x="0" y="200" width="260" height="38"/>
    <text class="text" x="18" y="224">Based in Hyderabad, India 📍</text>
  </g>
</svg>
